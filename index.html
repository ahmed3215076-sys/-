<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض المجسم ثلاثي الأبعاد</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: radial-gradient(circle, #3a3a3a 0%, #1a1a1a 100%);
        }
        model-viewer { 
            width: 100%; 
            height: 100vh; 
            background: transparent; 
        }
        #msg { 
            font-family: Arial, sans-serif; 
            color: #ffffff; 
            font-size: 18px; 
            text-align: center; 
            padding: 20px; 
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>

    <!-- أضفنا autoplay والتحكم الكامل في تشغيل الأنيميشن -->
    <model-viewer 
        id="viewer" 
        src="" 
        alt="3D Model" 
        shadow-intensity="0.5" 
        camera-controls 
        touch-action="pan-y" 
        exposure="1"
        autoplay
        ar 
        style="display:none;">
    </model-viewer>
    
    <div id="msg">جاري تحميل المجسم...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('file'); 
        const viewer = document.getElementById('viewer');
        const msg = document.getElementById('msg');

        if (modelName) {
            // هيشغل الملف سواء كان .glb أو .gltf
            viewer.src = modelName + '.gltf';
            
            // كود إجبار تشغيل الأنيميشن برمجياً بمجرد ما المجسم يخلص تحميل
            viewer.addEventListener('load', () => {
                viewer.style.display = 'block';
                msg.style.display = 'none';
                
                // سطر سحري بيلقط أول أنيميشن في الملف ويشغله فوراً
                if (viewer.availableAnimations.length > 0) {
                    viewer.animationName = viewer.availableAnimations[0];
                    viewer.play();
                }
            });

        } else {
            msg.innerText = "برجاء اختيار الموديل الصحيح من الرابط.";
        }
    </script>

</body>
</html>
