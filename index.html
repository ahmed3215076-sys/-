<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الموديل 3D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }
        /* حجم شاشة العرض للموديل */
        model-viewer {
            width: 90%;
            height: 80vh;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
    </style>
    <!-- استدعاء أداة جوجل لعرض الـ 3D والواقع المعزز -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>

    <!-- كود عرض الموديل -->
    <model-viewer 
       src="الحالة الأولي.glb"
        alt="3D Model" 
        shadow-intensity="1" 
        camera-controls 
        touch-action="pan-y" 
        ar>
    </model-viewer>

</body>
</html>
